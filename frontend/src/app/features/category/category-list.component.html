<section>
  <div class="section-header">
    <h2>Category Master</h2>
    <button type="button" (click)="goToCreate()">Add New</button>
  </div>

  <p *ngIf="isLoading">Loading...</p>
  <p *ngIf="errorMessage">{{ errorMessage }}</p>

  <table *ngIf="!isLoading && categories.length">
    <thead>
      <tr>
        <th>CategoryId</th>
        <th>CategoryName</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let category of categories">
        <td>{{ category.category_id }}</td>
        <td>{{ category.category_name }}</td>
        <td class="actions-cell">
          <button type="button" (click)="goToEdit(category.category_id)">Edit</button>
          <button type="button" (click)="deleteCategory(category.category_id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!isLoading && !categories.length">No categories found.</p>
</section>
